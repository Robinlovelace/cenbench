name: Run Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'dvc.yaml'
      - 'config/**'
      - 'data/**'
      - 'README.qmd'
  workflow_dispatch:

jobs:
  repro:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read

    container:
      image: ghcr.io/robinlovelace/cenbench:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Run DVC pipeline
        run: dvc repro

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update README.md and results [skip ci]"
          file_pattern: README.md dvc.lock results/*.csv results/*.png
