stages:
  prepare_demand:
    cmd: PYTHONPATH=. .venv/bin/python scripts/prepare_demand.py --city leuven
    deps:
      - scripts/prepare_demand.py
      - scripts/config.py
      - config/cities.yaml
    outs:
      - data/leuven_worldpop_origins.geojson
      - data/leuven_attractors.geojson

  bench_centrality:
    cmd: PYTHONPATH=. .venv/bin/python scripts/bench_centrality.py --city leuven
    deps:
      - scripts/bench_centrality.py
      - scripts/config.py
      - config/cities.yaml
      - scripts/utils/helpers.py
      - data/leuven_walk_edges.gpkg
      - data/leuven_telraam_pedestrians_4326.geojson
    outs:
      - results/leuven_centrality_results.csv

  bench_cityseer_demand:
    cmd: PYTHONPATH=. .venv/bin/python scripts/run_cityseer_demand_experiments.py
    deps:
      - scripts/run_cityseer_demand_experiments.py
      - scripts/config.py
      - config/cities.yaml
      - scripts/utils/helpers.py
      - data/leuven_walk_edges.gpkg
      - data/leuven_telraam_pedestrians_4326.geojson
      - data/leuven_worldpop_origins.geojson
      - data/leuven_attractors.geojson
    outs:
      - results/leuven_cityseer_demand_results.csv
      - results/cityseer_demand_best_predictions.csv
      - leuven-map-cityseer-demand.html

  bench_madina_gravity:
    cmd: PYTHONPATH=. .venv/bin/python scripts/run_madina_demand_experiments.py --city leuven
    deps:
      - scripts/run_madina_demand_experiments.py
      - scripts/run_single_experiment.py
      - scripts/config.py
      - config/cities.yaml
      - scripts/utils/helpers.py
      - data/leuven_walk_edges.gpkg
      - data/leuven_telraam_pedestrians_4326.geojson
      - data/leuven_worldpop_origins.geojson
      - data/leuven_attractors.geojson
    outs:
      - results/leuven_madina_worldpop_results.csv

  bench_sdna:
    cmd: PYTHONPATH=. .venv/bin/python scripts/bench_sdna.py
    deps:
      - scripts/bench_sdna.py
      - scripts/config.py
      - config/cities.yaml
      - scripts/utils/helpers.py
      - data/leuven_walk_edges.gpkg
      - data/leuven_telraam_pedestrians_4326.geojson
    outs:
      - results/sdna_results.csv
      - results/sdna_best_predictions.csv

  generate_interactive_map:
    cmd: PYTHONPATH=. .venv/bin/python scripts/generate_interactive_map.py --city leuven
    deps:
      - scripts/generate_interactive_map.py
      - scripts/config.py
      - config/cities.yaml
      - scripts/utils/helpers.py
      - data/leuven_walk_edges.gpkg
      - data/leuven_telraam_pedestrians_4326.geojson
    outs:
      - leuven-map.html
      - results/leuven_best_predictions.csv

  merge_results:
    cmd: PYTHONPATH=. .venv/bin/python scripts/merge_all.py
    deps:
      - scripts/merge_all.py
      - results/leuven_centrality_results.csv
      - results/leuven_cityseer_demand_results.csv
      - results/leuven_madina_worldpop_results.csv
      - results/sdna_results.csv
    outs:
      - results/leuven_results.csv

  generate_plots:
    cmd: PYTHONPATH=. .venv/bin/python scripts/fig_input_datasets.py --city leuven && PYTHONPATH=. .venv/bin/python scripts/fig_tool_comparison.py --city leuven
    deps:
      - scripts/fig_input_datasets.py
      - scripts/fig_tool_comparison.py
      - scripts/config.py
      - config/cities.yaml
      - results/leuven_best_predictions.csv
      - results/cityseer_demand_best_predictions.csv
      - results/sdna_best_predictions.csv

  render_report:
    cmd: quarto render README.qmd --to gfm
    deps:
      - README.qmd
      - results/leuven_input_datasets.png
      - results/fig4_tool_panels.png
      - results/leuven_results.csv
      - appendix-other-tools.qmd
    outs:
      - README.md:
          cache: false
      - results/fig1_barplot.png:
          cache: false
      - results/fig_gravity_barplot.png:
          cache: false
